<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Huddle Landing Page</title>


    <link rel="stylesheet" href="style.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Open+Sans:wght@400&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
        <div class="container">
            <header>
                <img src="images/logo.svg" alt="logo" class="logo">
            </header>
            <main>
                <div class="image-section">
                    <img src="images/illustration-mockups.svg" alt="mockup image">
                </div>
                <div class="text-section">
                    <h1>
                        Build The Community Your Fans Will Love
                    </h1>
                    <p>
                        Huddle re-imagines the way we build communities.
                        You have a voice, but so does your audience.
                        Create connections with your users as you engage
                        in genuine discussion.
                    </p>
                    <button>Register</button>
                </div>
            </main>
            
            <div class="social-icons">
                
                <a href="#">
                    <i class="fab fa-facebook-f"></i>
                </a>
                
                <a href="#">
                    <i class="fab fa-twitter"></i>
                </a>
                
                <a href="#">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>
    </body>
</html>
